name: OpenCode PR Review
on:
  pull_request:
    types: [opened, synchronize, reopened]
  issues:
    types: [opened]
jobs:
  opencode:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Run OpenCode
        uses: anomalyco/opencode/github@latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          model: opencode/deepseek-v4-flash
          use_github_token: true
          prompt: |
            If this is a pull request: review it thoroughly, check for bugs, security issues, performance problems, style violations. Be specific with line numbers.
            If this is an issue: read it carefully and post a helpful response with setup instructions, code examples, or troubleshooting steps to resolve it.
